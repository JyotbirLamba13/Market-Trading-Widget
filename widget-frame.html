<!DOCTYPE html>
<!--
  widget-frame.html
  Static reference template for the TradingView ticker-tape widget.
  In practice, content.js generates dynamic blob HTML using this pattern,
  injecting user's saved symbols + theme at render time.
  This file is also used directly as a fallback via chrome.runtime.getURL().
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
    .tradingview-widget-container { width: 100%; height: 100%; }
    .tradingview-widget-container__widget { height: 100%; }
  </style>
</head>
<body>
  <!-- Ticker Tape: NIFTY 50 + SENSEX (hardcoded defaults per Step 2) -->
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript"
      src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
      async>
    {
      "symbols": [
        { "proName": "NSE:NIFTY",   "title": "NIFTY 50" },
        { "proName": "BSE:SENSEX",  "title": "SENSEX"   }
      ],
      "showSymbolLogo": false,
      "colorTheme": "dark",
      "isTransparent": true,
      "displayMode": "compact",
      "locale": "en"
    }
    </script>
  </div>
</body>
</html>
